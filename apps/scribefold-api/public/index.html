<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ScribeFold AI</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body, html {
      width: 100%;
      height: 100%;
      overflow: hidden;
    }

    body {
      background: transparent;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: none;
    }

    .black-background {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.8);
      /* z-index: -2; */
    }

    .blue-gradient-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: radial-gradient(
        circle at center,
        rgba(135, 206, 250, 0.4) 0%,
        rgba(70, 130, 180, 0.35) 25%,
        rgba(65, 105, 225, 0.4) 50%,
        rgba(30, 58, 138, 0.35) 75%,
        rgba(0, 0, 128, 0.4) 100%
      );
      z-index: -1;
    }

    .glow-effect {
      position: absolute;
      width: 0px;
      height: 0px;
      border-radius: 50%;
      background: radial-gradient(
        circle,
        rgba(135, 206, 250, 0.3) 0%,
        rgba(70, 130, 180, 0.2) 30%,
        rgba(65, 105, 225, 0.1) 60%,
        transparent 100%
      );
      animation: glowPulse 8s ease-in-out infinite;
      z-index: -1;
    }

    @keyframes glowPulse {
      0%, 100% {
        transform: scale(1);
        opacity: 0.3;
        box-shadow: 0 0 20px 10px rgba(135, 206, 250, 0.1),
                    0 0 30px 15px rgba(70, 130, 180, 0.08),
                    0 0 40px 20px rgba(65, 105, 225, 0.05);
      }
      50% {
        transform: scale(12);
        opacity: 0.5;
        box-shadow: 0 0 60px 30px rgba(135, 206, 250, 0.2),
                    0 0 90px 45px rgba(70, 130, 180, 0.15),
                    0 0 120px 60px rgba(65, 105, 225, 0.1);
      }
    }

    .icon-container {
      display: flex;
      align-items: center;
      justify-content: center;
      animation: pulse 4s ease-in-out infinite;
      z-index: 1;
      user-select: none;
    }

    .icon-container img {
      width: 256px;
      height: 256px;
      object-fit: contain;
    }

    @keyframes pulse {
      0%, 100% {
        transform: scale(1);
        opacity: 0.9;
      }
      50% {
        transform: scale(1.05);
        opacity: 1;
      }
    }
  </style>
</head>
<body>
  <div class="black-background"></div>
  <div class="blue-gradient-overlay"></div>
  <div class="icon-container">
    <div class="glow-effect"></div>
    <img src="/images/scribefold-ai-icon-png.png" alt="ScribeFold AI" />
  </div>
</body>
</html>
