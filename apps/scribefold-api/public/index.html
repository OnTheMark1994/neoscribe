<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ScribeFold AI</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body, html {
      width: 100%;
      height: 100%;
      overflow: hidden;
    }

    body {
      background: transparent;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
    }

    .black-background {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.8);
      /* z-index: -2; */
    }

    .blue-gradient-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: linear-gradient(
        /* 135deg, */
        90deg,
        rgba(135, 206, 250, 0.6) 0%,
        rgba(70, 130, 180, 0.55) 25%,
        rgba(65, 105, 225, 0.6) 50%,
        rgba(30, 58, 138, 0.55) 75%,
        rgba(0, 0, 128, 0.6) 100%
      );
      background-size: 400% 400%;
      animation: gradientMove 15s ease infinite;
      z-index: -1;
    }

    @keyframes gradientMove {
      0% {
        background-position: 0% 50%;
      }
      50% {
        background-position: 100% 50%;
      }
      100% {
        background-position: 0% 50%;
      }
    }

    .icon-container {
      display: flex;
      align-items: center;
      justify-content: center;
      animation: pulse 3s ease-in-out infinite;
      z-index: 1;
    }

    .icon-container img {
      width: 256px;
      height: 256px;
      object-fit: contain;
    }

    @keyframes pulse {
      0%, 100% {
        transform: scale(1);
        opacity: 0.9;
      }
      50% {
        transform: scale(1.05);
        opacity: 1;
      }
    }
  </style>
</head>
<body>
  <div class="black-background"></div>
  <div class="blue-gradient-overlay"></div>
  <div class="icon-container">
    <img src="/images/scribefold-ai-icon-png.png" alt="ScribeFold AI" />
  </div>
</body>
</html>
