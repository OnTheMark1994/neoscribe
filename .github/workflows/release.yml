name: Build and Release ScribeFold AI

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:  # Allow manual rebuilds without a new tag

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install dependencies
        run: |
          cd apps/desktop-app
          npm ci
      - name: Build Windows
        env:
          CI: false
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          cd apps/desktop-app
          npm run build:win
      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-exe
          path: apps/desktop-app/release/*.exe

  build-macos:
    needs: build-windows  # Run after Windows
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install dependencies
        run: |
          cd apps/desktop-app
          npm ci
      - name: Build macOS
        env:
          CI: false  # Allow react-scripts build to pass with warnings in CI
        run: |
          cd apps/desktop-app
          npm run build:mac
      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: macos-dmg
          path: apps/desktop-app/release/*.dmg

  build-linux:
    needs: build-macos  # Run after macOS
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install dependencies
        run: |
          cd apps/desktop-app
          npm ci
      - name: Build Linux
        env:
          CI: false  # Allow react-scripts build to pass with warnings in CI
        run: |
          cd apps/desktop-app
          npm run build:linux
      - name: Upload Linux artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux-appimage
          path: apps/desktop-app/release/*.AppImage

  create-release:
    needs: build-windows  # Only require Windows to succeed
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            artifacts/windows-exe/*.exe
            artifacts/macos-dmg/*.dmg
            artifacts/linux-appimage/*.AppImage
          draft: false
          prerelease: false
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
