name: Build and Release ScribeFold AI

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:  # Allow manual rebuilds without a new tag

permissions:
  contents: write
  packages: write

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install dependencies
        run: |
          cd apps/scribefold-editor
          npm install
      - name: Verify version matches tag
        run: |
          $PKG_VERSION = node -p "require('./apps/scribefold-editor/package.json').version"
          $GIT_TAG = "${{ github.ref_name }}"
          echo "Package version: $PKG_VERSION"
          echo "Git tag: $GIT_TAG"
          if ($GIT_TAG -ne "v$PKG_VERSION") {
            Write-Error "Version mismatch! Git tag '$GIT_TAG' does not match package.json version 'v$PKG_VERSION'"
            exit 1
          }
          echo "✓ Version verified: v$PKG_VERSION"
      - name: Build Windows
        env:
          CI: false
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          cd apps/scribefold-editor
          npm run build:win
      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-exe
          path: apps/scribefold-editor/release/*.exe

  build-macos:
    needs: build-windows  # Run after Windows
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install dependencies
        run: |
          cd apps/scribefold-editor
          npm install
      - name: Verify version matches tag
        run: |
          PKG_VERSION=$(node -p "require('./apps/scribefold-editor/package.json').version")
          GIT_TAG="${{ github.ref_name }}"
          echo "Package version: $PKG_VERSION"
          echo "Git tag: $GIT_TAG"
          if [ "$GIT_TAG" != "v$PKG_VERSION" ]; then
            echo "❌ Version mismatch! Git tag '$GIT_TAG' does not match package.json version 'v$PKG_VERSION'"
            exit 1
          fi
          echo "✓ Version verified: v$PKG_VERSION"
      - name: Build macOS
        env:
          CI: false
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          cd apps/scribefold-editor
          npm run build:mac
      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: macos-dmg
          path: apps/scribefold-editor/release/*.dmg

  build-linux:
    needs: build-macos  # Run after macOS
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install dependencies
        run: |
          cd apps/scribefold-editor
          npm install
      - name: Verify version matches tag
        run: |
          PKG_VERSION=$(node -p "require('./apps/scribefold-editor/package.json').version")
          GIT_TAG="${{ github.ref_name }}"
          echo "Package version: $PKG_VERSION"
          echo "Git tag: $GIT_TAG"
          if [ "$GIT_TAG" != "v$PKG_VERSION" ]; then
            echo "❌ Version mismatch! Git tag '$GIT_TAG' does not match package.json version 'v$PKG_VERSION'"
            exit 1
          fi
          echo "✓ Version verified: v$PKG_VERSION"
      - name: Build Linux
        env:
          CI: false
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          cd apps/scribefold-editor
          npm run build:linux
      - name: Upload Linux artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux-appimage
          path: apps/scribefold-editor/release/*.AppImage

  create-release:
    needs: [build-windows, build-macos, build-linux]  # Require all builds to succeed
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            artifacts/windows-exe/*
            artifacts/macos-dmg/*
            artifacts/linux-appimage/*
          generate_release_notes: false
          body: ''
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
