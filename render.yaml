services:
  # API Server – Dynamic Node.js
  - type: web
    name: scribefold-ai-api
    runtime: node
    region: oregon
    plan: starter
    rootDir: apps/scribefold-api
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "8080"

  # Web Portal – Static site (FIXED: No region for static)
  - type: web
    name: scribefold-ai-web-portal
    runtime: static
    plan: starter
    rootDir: apps/scribefold-web-portal
    buildCommand: npm install && npm run build
    staticPublishPath: ./build
    envVars:
      - key: NODE_ENV
        value: production

# Add your secrets only in the Render dashboard, never here