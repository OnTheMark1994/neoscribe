services:
  # API Server – Dynamic Node.js
  - type: web
    name: scribefold-ai-api
    runtime: node
    region: oregon
    plan: free
    rootDir: apps/api-server
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "3000"

  # Web Portal – Static site (THIS IS THE FIXED ONE)
  - type: web
    name: scribefold-ai-web-portal
    runtime: static          # ← REQUIRED LINE (was missing before)
    region: oregon
    plan: free
    rootDir: apps/web-portal
    buildCommand: npm install && npm run build
    staticPublishPath: ./build
    envVars:
      - key: NODE_ENV
        value: production
    # ← THIS EXTRA BLANK COMMENT LINE forces Git to see a change

# Add your secrets only in the Render dashboard, never here